<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="robots" content="noindex">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SCADA APP</title>
        <link rel="icon" type="image/png" href="https://www.tramontina.net/intranet/favicon.ico">
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <main class="app-shell" aria-labelledby="page-title">
            <section class="intro">
                <img
                    class="app-logo"
                    alt="Logo do SCADA APP"
                    src="https://mobile-tramontina.github.io/catalogo/apple/icone.png"
                >

                <h1 id="page-title">SCADA APP</h1>

                <p class="description">
                    O SCADA APP &eacute; um software desenvolvido pela Tramontina para notificar mensagens do SCADA para os respons&aacute;veis.
                </p>
            </section>

            <section class="downloads" aria-labelledby="download-title">
                <h2 id="download-title">Selecione seu sistema para realizar o download</h2>

                <ul class="download-list">
                    <li>
                        <a class="download-card" href="https://mobile-tramontina.github.io/catalogo/android/scada32.apk" aria-label="Baixar SCADA APP para Android 32 bits">
                            <img src="img/logo_android_32.png" alt="Android 32 bits">
                        </a>
                    </li>

                    <li>
                        <a class="download-card" href="https://mobile-tramontina.github.io/catalogo/android/scada.apk" aria-label="Baixar SCADA APP para Android 64 bits">
                            <img src="img/logo_android_64.png" alt="Android 64 bits">
                        </a>
                    </li>

                    <li>
                        <a class="download-card" href="itms-services://?action=download-manifest&amp;url=https://mobile-tramontina.github.io/catalogo/apple/scada.plist" aria-label="Baixar SCADA APP para iOS">
                            <img src="img/logo_apple.png" alt="iOS Apple">
                        </a>
                    </li>
                </ul>
            </section>
        </main>
    </body>
</html>
